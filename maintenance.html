<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site en maintenance</title>
    <!-- Méta tags pour le SEO même pendant la maintenance -->
    <meta name="description" content="Notre site est actuellement en maintenance. Nous serons de retour rapidement.">
    <!-- Police moderne -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-color: #2563eb;
            --accent-light: #eff6ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            height: 100%;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            text-align: center;
        }

        /* Conteneur principal */
        .maintenance-container {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            max-width: 520px;
            width: 90%;
            border: 1px solid rgba(0, 0, 0, 0.05);
            /* Apparition fluide */
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cadre de l'icône */
        .icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background-color: var(--accent-light);
            border-radius: 24px;
            margin-bottom: 24px;
            transform: rotate(-3deg);
            transition: transform 0.3s ease;
        }

        .icon-wrapper:hover {
            transform: rotate(3deg);
        }

        .icon {
            width: 40px;
            height: 40px;
            color: var(--accent-color);
            /* Rotation très douce */
            animation: spin 8s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Typographie */
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        /* Animation de chargement */
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out both;
            opacity: 0.3;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes pulse {

            0%,
            80%,
            100% {
                transform: scale(0.8);
                opacity: 0.3;
            }

            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .maintenance-container {
                padding: 40px 24px;
                border-radius: 16px;
            }

            h1 {
                font-size: 26px;
            }

            p {
                font-size: 15px;
                margin-bottom: 28px;
            }

            .icon-wrapper {
                width: 64px;
                height: 64px;
                border-radius: 18px;
                margin-bottom: 20px;
            }

            .icon {
                width: 32px;
                height: 32px;
            }
        }

        @media (max-width: 350px) {
            h1 {
                font-size: 22px;
            }

            p {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="maintenance-container">

        <div class="icon-wrapper">
            <!-- Icône "engrenage" fine et design -->
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                </path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
        </div>

        <h1>Site en maintenance</h1>

        <p>Notre site est actuellement en cours d'amélioration pour vous offrir une meilleure expérience. Nous serons de
            retour très rapidement. Merci de votre patience.</p>

        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

    </div>
</body>

</html>
